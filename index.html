<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            font-weight: 700;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1em;
        }

        .form-section, .search-section {
            margin-bottom: 30px;
        }

        .form-card, .search-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .form-card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        input {
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .search-card {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 45px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 20px;
            z-index: 1;
        }

        #busca {
            padding-left: 70px;
            width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .produto-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .produto-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .produto-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }

        .imagem-produto {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #f0f2f5, #e9ecef);
        }

        .produto-info h3 {
            color: #2c3e50;
            font-size: 1.4em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .produto-meta {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            color: #6c757d;
        }

        .valor-total {
            font-size: 1.3em;
            font-weight: 700;
            color: #28a745;
        }

        .btn-remove {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
        }

        .btn-remove:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .status {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .status.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-warehouse"></i> Controle de Estoque Pro</h1>
            <div class="stats">
                <span class="stat" id="totalItens">0 itens</span>
                <span class="stat" id="totalValor">R$ 0,00</span>
            </div>
        </header>

        <section class="form-section">
            <div class="form-card">
                <h2><i class="fas fa-plus"></i> Novo Produto</h2>
                <div class="form-grid">
                    <input type="text" id="produto" placeholder="Nome do produto">
                    <input type="number" id="quantidade" placeholder="Quantidade" min="0">
                    <input type="number" id="preco" placeholder="Preço (R$)" step="0.01" min="0">
                    <input type="url" id="imagem" placeholder="URL da imagem (opcional)">
                    <button class="btn-primary" onclick="adicionarItem()">
                        <i class="fas fa-save"></i> Adicionar
                    </button>
                </div>
            </div>
        </section>

        <section class="search-section">
            <div class="search-card">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="busca" placeholder="🔍 Buscar produto..." onkeyup="buscar()">
            </div>
        </section>

        <section class="estoque-section">
            <div class="grid" id="gridEstoque">
                <!-- Produtos renderizados aqui -->
            </div>
        </section>
    </div>

    <div id="statusMsg" class="status"></div>

    <script>
        let estoque = [];

        // Função para mostrar mensagens
        function mostrarStatus(msg, tipo = 'success') {
            const status = document.getElementById('statusMsg');
            status.textContent = msg;
            status.style.background = tipo === 'success' ? '#28a745' : '#dc3545';
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        // Carrega dados do JSON ou localStorage
        async function carregarEstoque() {
            try {
                const response = await fetch('estoque.json');
                if (response.ok) {
                    estoque = await response.json();
                    mostrarStatus('Dados carregados do estoque.json!');
                } else {
                    // Fallback para localStorage
                    const dadosLocal = localStorage.getItem('estoque');
                    estoque = dadosLocal ? JSON.parse(dadosLocal) : [];
                }
            } catch (error) {
                // Fallback para localStorage se JSON falhar
                const dadosLocal = localStorage.getItem('estoque');
                estoque = dadosLocal ? JSON.parse(dadosLocal) : [];
            }
            atualizarDashboard();
            renderizarEstoque();
        }

        // Adiciona novo item
        async function adicionarItem() {
            const produto = document.getElementById('produto').value.trim();
            const quantidade = parseInt(document.getElementById('quantidade').value);
            const preco = parseFloat(document.getElementById('preco').value);
            const imagem = document.getElementById('imagem').value.trim() || 
                          `https://via.placeholder.com/300x180/667eea/ffffff?text=${encodeURIComponent(produto)}`;

            if (!produto || quantidade <= 0 || preco <= 0) {
                mostrarStatus('Preencha todos os campos corretamente!', 'error');
                return;
            }

            const novoItem = {
                id: Date.now(),
                produto,
                quantidade,
                preco,
                imagem
            };

            estoque.push(novoItem);
            
            // Salva em localStorage sempre
            localStorage.setItem('estoque', JSON.stringify(estoque));
            
            // Tenta salvar no JSON
            try {
                await fetch('estoque.json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(estoque)
                });
            } catch(e) {
                console.log('Salvamento JSON falhou, usando localStorage');
            }

            limparFormulario();
            atualizarDashboard();
            renderizarEstoque();
            mostrarStatus('Produto adicionado com sucesso!');
        }

        // Limpa formulário
        function limparFormulario() {
            document.getElementById('produto').value = '';
            document.getElementById('quantidade').value = '';
            document.getElementById('preco').value = '';
            document.getElementById('imagem').value = '';
        }

        // Atualiza dashboard
        function atualizarDashboard() {
            const totalItens = estoque.length;
            const totalValor = estoque.reduce((sum, item) => sum + (item.quantidade * item.preco), 0);
            
            document.getElementById('totalItens').textContent = `${totalItens} itens`;
            document.getElementById('totalValor').textContent = `R$ ${totalValor.toFixed(2)}`;
        }

        // Renderiza estoque com filtro
        function renderizarEstoque(filtro = '') {
            const grid = document.getElementById('gridEstoque');
            const itensFiltrados = estoque.filter(item => 
                item.produto.toLowerCase().includes(filtro.toLowerCase())
            );

            grid.innerHTML = itensFiltrados.map(item => `
                <div class="produto-card" data-id="${item.id}">
                    <img src="${item.imagem}" alt="${item.produto}" class="imagem-produto" 
                         onerror="this.src='https://via.placeholder.com/300x180/667eea/ffffff?text=${encodeURIComponent(item.produto)}'">
                    <div class="produto-info">
                        <h3>${item.produto}</h3>
                        <div class="produto-meta">
                            <span><i class="fas fa-box"></i> ${item.quantidade}</span>
                            <span><i class="fas fa-tag"></i> R$ ${item.preco.toFixed(2)}</span>
                        </div>
                        <div class="valor-total">
                            <i class="fas fa-calculator"></i> R$ ${(item.quantidade * item.preco).toFixed(2)}
                        </div>
                        <button class="btn-remove" onclick="removerItem(${item.id})">
                            <i class="fas fa-trash"></i> Remover
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Busca em tempo real
        function buscar() {
            const termo = document.getElementById('busca').value;
            renderizarEstoque(termo);
        }

        // Remove item
        function removerItem(id) {
            if (confirm('Deseja remover este produto?')) {
                estoque = estoque.filter(item => item.id !== id);
                localStorage.setItem('estoque', JSON.stringify(estoque));
                atualizarDashboard();
                renderizarEstoque();
                mostrarStatus('Produto removido!');
            }
        }

        // Inicialização
        document.addEventListener('DOMContentLoaded', carregarEstoque);
    </script>
</body>
</html>
